name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build macOS binaries and archives
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/arm64 dist/amd64

          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/arm64/anthro-env ./cmd/anthro-env
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/amd64/anthro-env ./cmd/anthro-env

          tar -C dist/arm64 -czf "dist/anthro-env_${VERSION}_macos_arm64.tar.gz" anthro-env
          tar -C dist/amd64 -czf "dist/anthro-env_${VERSION}_macos_x86_64.tar.gz" anthro-env

          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/anthro-env_*_macos_arm64.tar.gz
            dist/anthro-env_*_macos_x86_64.tar.gz
            dist/checksums.txt
