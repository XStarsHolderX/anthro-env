name: update-homebrew-tap

on:
  push:
    tags:
      - "v*"

jobs:
  sync-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Update formula in source repo
        run: |
          scripts/update_homebrew_formula.sh "${GITHUB_REF_NAME}" "kelaocai" "anthro-env"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: kelaocai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Copy formula into tap
        run: |
          mkdir -p tap/Formula
          cp packaging/homebrew/anthro-env.rb tap/Formula/anthro-env.rb

      - name: Commit and push formula update
        working-directory: tap
        run: |
          if git diff --quiet; then
            echo "No formula change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/anthro-env.rb
          git commit -m "chore: update anthro-env formula for ${GITHUB_REF_NAME}"
          git push
