name: update-homebrew-tap

on:
  push:
    tags:
      - "v*"

jobs:
  sync-formula:
    runs-on: ubuntu-latest
    env:
      TAP_REPO: kelaocai/homebrew-tap
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Update formula in source repo
        run: |
          scripts/update_homebrew_formula.sh "${GITHUB_REF_NAME}" "kelaocai" "anthro-env"

      - name: Validate HOMEBREW_TAP_TOKEN
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing repository secret: HOMEBREW_TAP_TOKEN"
            echo "Go to Settings > Secrets and variables > Actions, then add HOMEBREW_TAP_TOKEN."
            exit 1
          fi

          code="$(curl -s -o /tmp/tap_repo_check.json -w "%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${TAP_REPO}")"
          if [ "${code}" -ne 200 ]; then
            echo "Cannot access ${TAP_REPO} with HOMEBREW_TAP_TOKEN (HTTP ${code})."
            echo "Make sure the token has repo write permission and can access ${TAP_REPO}."
            cat /tmp/tap_repo_check.json || true
            exit 1
          fi

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Copy formula into tap
        run: |
          mkdir -p tap/Formula
          cp packaging/homebrew/anthro-env.rb tap/Formula/anthro-env.rb

      - name: Commit and push formula update
        working-directory: tap
        run: |
          if git diff --quiet; then
            echo "No formula change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/anthro-env.rb
          git commit -m "chore: update anthro-env formula for ${GITHUB_REF_NAME}"
          if ! git push; then
            echo "Failed to push to ${TAP_REPO}."
            echo "Check HOMEBREW_TAP_TOKEN scope/permissions and repo access."
            exit 1
          fi
